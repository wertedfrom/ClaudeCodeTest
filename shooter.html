function createSprite(pixelData, palette, scale) {
  const h = pixelData.length;
  const w = pixelData[0].length;
  const c = document.createElement('canvas');
  c.width = w * scale;
  c.height = h * scale;
  const ctx = c.getContext('2d');
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const ci = pixelData[y][x];
      if (ci === 0) continue;
      ctx.fillStyle = palette[ci];
      ctx.fillRect(x * scale, y * scale, scale, scale);
    }
  }
  return c;
}

// ============================================================
// SECTION 3: MATH UTILITIES
// ============================================================
function angleBetween(x1, y1, x2, y2) { return Math.atan2(y2 - y1, x2 - x1); }
function distance(x1, y1, x2, y2) { const dx = x2 - x1, dy = y2 - y1; return Math.sqrt(dx * dx + dy * dy); }
function clamp(v, min, max) { return v < min ? min : v > max ? max : v; }
function randRange(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(randRange(min, max + 1)); }

// ============================================================
// SECTION 4: INPUT SYSTEM
// ============================================================
const input = {
  keys: {},
  mouseX: CONFIG.W / 2,
  mouseY: CONFIG.H / 2,
  mouseDown: false,
  init(canvas) {
    window.addEventListener('keydown', e => {
      this.keys[e.key.toLowerCase()] = true;
      if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
    });
    window.addEventListener('keyup', e => this.keys[e.key.toLowerCase()] = false);
    canvas.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      this.mouseX = e.clientX - r.left;
      this.mouseY = e.clientY - r.top;
    });
    canvas.addEventListener('mousedown', e => { if (e.button === 0) this.mouseDown = true; });
    canvas.addEventListener('mouseup', e => { if (e.button === 0) this.mouseDown = false; });
    canvas.addEventListener('contextmenu', e => e.preventDefault());
  }
};

// ============================================================
// SECTION 5: ENTITIES
// ============================================================
let player, bullets, enemies, particles;

function createPlayer() {
  return {
    x: CONFIG.W / 2,
    y: CONFIG.H / 2,
    speed: CONFIG.PLAYER_SPEED,
    hp: CONFIG.PLAYER_MAX_HP,
    maxHp: CONFIG.PLAYER_MAX_HP,
    size: CONFIG.PLAYER_SIZE,
    angle: 0,
    lastFireTime: 0,
    animFrame: 0,
    animTimer: 0,
    isMoving: false,
    invulnTimer: 0,
  };
}

function createBullet(x, y, angle) {
  return {
    x, y,
    vx: Math.cos(angle) * CONFIG.BULLET_SPEED,
    vy: Math.sin(angle) * CONFIG.BULLET_SPEED,
    size: CONFIG.BULLET_SIZE,
    alive: true,
  };
}

function createEnemy(type, level) {
  const def = ENEMY_TYPES[type];
  const speedMult = 1 + (level - 1) * 0.08;
  let x, y;
  const edge = randInt(0, 3);
  const M = CONFIG.SPAWN_MARGIN;
  if (edge === 0) { x = randRange(0, CONFIG.W); y = -M; }
  else if (edge === 1) { x = randRange(0, CONFIG.W); y = CONFIG.H + M; }
  else if (edge === 2) { x = -M; y = randRange(0, CONFIG.H); }
  else { x = CONFIG.W + M; y = randRange(0, CONFIG.H); }
  return {
    x, y,
    speed: def.speed * speedMult,
    hp: def.hp,
    maxHp: def.hp,
    size: def.size,
    type,
    score: def.score,
    angle: 0,
    animFrame: 0,
    animTimer: 0,
    flashTimer: 0,
    alive: true,
  };
}

function createParticle(x, y, color) {
  const angle = randRange(0, Math.PI * 2);
  const speed = randRange(1, 4);
  return {
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 400,
    maxLife: 400,
    color,
    size: randRange(2, 5),
  };
}

// ============================================================
// SECTION 6: LEVEL MANAGER
// ============================================================
let level = {
  current: 1,
  totalEnemies: 0,
  spawnedCount: 0,
  spawnTimer: 0,
  spawnInterval: CONFIG.SPAWN_BASE_INTERVAL,
  transitionTimer: 0,
};

function initLevel(num) {
  level.current = num;
  level.totalEnemies = CONFIG.LEVEL_BASE_ENEMIES + (num - 1) * CONFIG.LEVEL_ENEMY_INC;
  level.spawnedCount = 0;
  level.spawnTimer = 0;
  level.spawnInterval = Math.max(500, CONFIG.SPAWN_BASE_INTERVAL - num * 120);
  level.transitionTimer = 0;
}

function pickEnemyType(lvl) {
  const r = Math.random();
  if (lvl >= 5) {
    if (r < 0.2) return 'tank';
    if (r < 0.5) return 'fast';
    return 'basic';
  }
  if (lvl >= 3) {
    if (r < 0.3) return 'fast';
    return 'basic';
  }
  return 'basic';
}

// ============================================================
// SECTION 7: COLLISION DETECTION
// ============================================================
function checkCollisions() {
  // Bullets vs enemies
  for (const b of bullets) {
    if (!b.alive) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (distance(b.x, b.y, e.x, e.y) < b.size + e.size) {
        b.alive = false;
        e.hp--;
        e.flashTimer = 80;
        playSound('hit');
        if (e.hp <= 0) {
          e.alive = false;
          score += e.score;
          playSound('explode');
          const color = ENEMY_TYPES[e.type].color;
          for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
            particles.push(createParticle(e.x, e.y, color));
          }
          // extra dark particles
          for (let i = 0; i < 3; i++) {
            particles.push(createParticle(e.x, e.y, ENEMY_TYPES[e.type].colorDark));
          }
        }
        break;
      }
    }
  }
  // Enemies vs player
  if (player.invulnTimer <= 0) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (distance(player.x, player.y, e.x, e.y) < player.size + e.size) {
        player.hp--;
        player.invulnTimer = CONFIG.INVULN_TIME;
        shakeTimer = 200;
        playSound('playerHit');
        // Knock enemy back
        const a = angleBetween(player.x, player.y, e.x, e.y);
        e.x += Math.cos(a) * 30;
        e.y += Math.sin(a) * 30;
        if (player.hp <= 0) {
          gameState = 'GAME_OVER';
          // Save high score
          const hi = localStorage.getItem('shooterHiScore') || 0;
          if (score > hi) localStorage.setItem('shooterHiScore', score);
        }
        break;
      }
    }
  }
}

// ============================================================
// SECTION 8: RENDERER / HUD
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let shakeTimer = 0;
let score = 0;
let gameState = 'MENU';

function renderBackground() {
  ctx.drawImage(SPRITES.background, 0, 0);
}

function renderPlayer() {
  if (player.invulnTimer > 0 && Math.floor(player.invulnTimer / 60) % 2 === 0) return; // blink
  const sprite = SPRITES.player[player.animFrame];
  const sw = sprite.width;
  const sh = sprite.height;
  ctx.drawImage(sprite, player.x - sw / 2, player.y - sh / 2);

  // Draw gun
  const gunLen = 18;
  const gunWidth = 4;
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);
  ctx.fillStyle = PALETTE.gun;
  ctx.fillRect(8, -gunWidth / 2, gunLen, gunWidth);
  ctx.fillStyle = PALETTE.gunDark;
  ctx.fillRect(8, gunWidth / 2 - 1, gunLen, 1);
  ctx.restore();
}

function renderBullets() {
  for (const b of bullets) {
    if (!b.alive) continue;
    ctx.fillStyle = PALETTE.bulletGlow;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PALETTE.bulletColor;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function renderEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    const sprites = SPRITES[e.type];
    const sprite = sprites[e.animFrame];
    const sw = sprite.width;
    const sh = sprite.height;

    if (e.flashTimer > 0) {
      // Draw white flash
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size + 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.drawImage(sprite, e.x - sw / 2, e.y - sh / 2);

    // HP bar for tanks
    if (e.type === 'tank' && e.hp < e.maxHp) {
      const barW = 20;
      const barH = 3;
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x - barW / 2, e.y - e.size - 8, barW, barH);
      ctx.fillStyle = '#44dd44';
      ctx.fillRect(e.x - barW / 2, e.y - e.size - 8, barW * (e.hp / e.maxHp), barH);
    }
  }
}

function renderParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    const s = p.size * alpha;
    ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
  }
  ctx.globalAlpha = 1;
}

function renderHUD() {
  // Health
  const hpBarW = 150;
  const hpBarH = 14;
  const hpX = 15;
  const hpY = 15;
  ctx.fillStyle = PALETTE.hudBg;
  ctx.fillRect(hpX - 2, hpY - 2, hpBarW + 4, hpBarH + 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(hpX, hpY, hpBarW, hpBarH);
  const hpRatio = player.hp / player.maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? PALETTE.hpFull : hpRatio > 0.25 ? PALETTE.hpMid : PALETTE.hpLow;
  ctx.fillRect(hpX, hpY, hpBarW * hpRatio, hpBarH);
  ctx.fillStyle = PALETTE.textMain;
  ctx.font = '11px monospace';
  ctx.fillText('HP', hpX + 3, hpY + 11);

  // Score
  ctx.textAlign = 'right';
  ctx.font = '14px monospace';
  ctx.fillText('SCORE: ' + score, CONFIG.W - 15, 26);
  ctx.textAlign = 'left';

  // Level
  ctx.textAlign = 'center';
  ctx.font = '13px monospace';
  ctx.fillStyle = PALETTE.textSub;
  ctx.fillText('LEVEL ' + level.current, CONFIG.W / 2, 26);

  // Enemies remaining
  const remaining = level.totalEnemies - level.spawnedCount + enemies.filter(e => e.alive).length;
  ctx.font = '11px monospace';
  ctx.fillText('ENEMIES: ' + remaining, CONFIG.W / 2, CONFIG.H - 15);
  ctx.textAlign = 'left';
}

function renderMenu() {
  renderBackground();

  // Title
  ctx.textAlign = 'center';
  ctx.font = 'bold 48px monospace';
  ctx.fillStyle = PALETTE.textAccent;
  ctx.fillText('RETRO SHOOTER', CONFIG.W / 2, 180);

  // Subtitle
  ctx.font = '16px monospace';
  ctx.fillStyle = PALETTE.textSub;
  ctx.fillText('A TOP-DOWN SURVIVAL SHOOTER', CONFIG.W / 2, 220);

  // Instructions
  ctx.font = '14px monospace';
  ctx.fillStyle = PALETTE.textMain;
  const instructions = [
    'WASD / ARROW KEYS  -  MOVE',
    'MOUSE  -  AIM',
    'LEFT CLICK  -  SHOOT',
    'ESC  -  PAUSE',
    '',
    'SURVIVE THE WAVES!',
  ];
  instructions.forEach((line, i) => {
    ctx.fillText(line, CONFIG.W / 2, 300 + i * 28);
  });

  // Start prompt
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = PALETTE.textAccent;
  const blink = Math.floor(Date.now() / 500) % 2;
  if (blink) ctx.fillText('PRESS ENTER TO START', CONFIG.W / 2, 500);

  // High score
  const hi = localStorage.getItem('shooterHiScore') || 0;
  if (hi > 0) {
    ctx.font = '13px monospace';
    ctx.fillStyle = PALETTE.textSub;
    ctx.fillText('HIGH SCORE: ' + hi, CONFIG.W / 2, 545);
  }

  ctx.textAlign = 'left';
}

function renderGameOver() {
  renderBackground();
  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);

  ctx.textAlign = 'center';
  ctx.font = 'bold 52px monospace';
  ctx.fillStyle = PALETTE.textAccent;
  ctx.fillText('GAME OVER', CONFIG.W / 2, 220);

  ctx.font = '18px monospace';
  ctx.fillStyle = PALETTE.textMain;
  ctx.fillText('SCORE: ' + score, CONFIG.W / 2, 290);
  ctx.fillText('LEVEL: ' + level.current, CONFIG.W / 2, 320);

  const hi = localStorage.getItem('shooterHiScore') || 0;
  ctx.font = '14px monospace';
  ctx.fillStyle = PALETTE.textSub;
  ctx.fillText('HIGH SCORE: ' + hi, CONFIG.W / 2, 365);

  ctx.font = 'bold 18px monospace';
  ctx.fillStyle = PALETTE.textAccent;
  const blink = Math.floor(Date.now() / 500) % 2;
  if (blink) ctx.fillText('PRESS ENTER TO RESTART', CONFIG.W / 2, 440);

  ctx.textAlign = 'left';
}

function renderLevelComplete() {
  // Still show game world
  renderBackground();
  renderBullets();
  renderEnemies();
  renderPlayer();
  renderParticles();
  renderHUD();

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);

  ctx.textAlign = 'center';
  ctx.font = 'bold 40px monospace';
  ctx.fillStyle = PALETTE.textAccent;
  ctx.fillText('LEVEL ' + level.current + ' COMPLETE!', CONFIG.W / 2, 270);

  ctx.font = '16px monospace';
  ctx.fillStyle = PALETTE.textMain;
  ctx.fillText('+' + (level.current * 500) + ' BONUS', CONFIG.W / 2, 320);

  ctx.textAlign = 'left';
}

function renderPaused() {
  renderBackground();
  renderBullets();
  renderEnemies();
  renderPlayer();
  renderParticles();
  renderHUD();

  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);

  ctx.textAlign = 'center';
  ctx.font = 'bold 48px monospace';
  ctx.fillStyle = PALETTE.textAccent;
  ctx.fillText('PAUSED', CONFIG.W / 2, 260);

  ctx.font = 'bold 16px monospace';
  ctx.fillStyle = PALETTE.textMain;
  const blink = Math.floor(Date.now() / 500) % 2;
  if (blink) ctx.fillText('PRESS ESC TO RESUME', CONFIG.W / 2, 320);

  ctx.textAlign = 'left';
}

// ============================================================
// SECTION 9: SOUND (Web Audio API)
// ============================================================
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playSound(type) {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    const now = ac.currentTime;

    if (type === 'shoot') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.start(now);
      osc.stop(now + 0.05);
    } else if (type === 'hit') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.06);
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc.start(now);
      osc.stop(now + 0.06);
    } else if (type === 'explode') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
    } else if (type === 'playerHit') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.15);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'levelUp') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.setValueAtTime(500, now + 0.1);
      osc.frequency.setValueAtTime(600, now + 0.2);
      osc.frequency.setValueAtTime(800, now + 0.3);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    }
  } catch (e) { /* audio not supported */ }
}

// ============================================================
// SECTION 10: GAME STATE MACHINE
// ============================================================
function startGame() {
  player = createPlayer();
  bullets = [];
  enemies = [];
  particles = [];
  score = 0;
  shakeTimer = 0;
  initLevel(1);
  gameState = 'PLAYING';
}

function update(dt) {
  if (gameState === 'MENU') {
    if (input.keys['enter']) {
      input.keys['enter'] = false;
      startGame();
    }
    return;
  }

  if (gameState === 'GAME_OVER') {
    if (input.keys['enter']) {
      input.keys['enter'] = false;
      gameState = 'MENU';
    }
    return;
  }

  if (gameState === 'PAUSED') {
    if (input.keys['escape'] || input.keys['p']) {
      input.keys['escape'] = false;
      input.keys['p'] = false;
      gameState = 'PLAYING';
    }
    return;
  }

  if (gameState === 'LEVEL_COMPLETE') {
    level.transitionTimer -= dt;
    // Update particles still
    updateParticles(dt);
    if (level.transitionTimer <= 0) {
      initLevel(level.current + 1);
      gameState = 'PLAYING';
    }
    return;
  }

  // === PLAYING ===
  if (input.keys['escape'] || input.keys['p']) {
    input.keys['escape'] = false;
    input.keys['p'] = false;
    gameState = 'PAUSED';
    return;
  }
  updatePlayer(dt);
  updateBullets(dt);
  updateEnemies(dt);
  updateParticles(dt);
  updateSpawning(dt);
  checkCollisions();

  if (shakeTimer > 0) shakeTimer -= dt;

  // Check level complete
  const allSpawned = level.spawnedCount >= level.totalEnemies;
  const allDead = enemies.every(e => !e.alive);
  if (allSpawned && allDead) {
    score += level.current * 500;
    player.hp = Math.min(player.hp + 1, player.maxHp);
    level.transitionTimer = CONFIG.LEVEL_PAUSE;
    gameState = 'LEVEL_COMPLETE';
    playSound('levelUp');
  }
}

function updatePlayer(dt) {
  let dx = 0, dy = 0;
  if (input.keys['w'] || input.keys['arrowup']) dy = -1;
  if (input.keys['s'] || input.keys['arrowdown']) dy = 1;
  if (input.keys['a'] || input.keys['arrowleft']) dx = -1;
  if (input.keys['d'] || input.keys['arrowright']) dx = 1;

  // Normalize diagonal
  if (dx !== 0 && dy !== 0) {
    const inv = 1 / Math.SQRT2;
    dx *= inv;
    dy *= inv;
  }

  player.isMoving = dx !== 0 || dy !== 0;
  player.x = clamp(player.x + dx * player.speed, player.size, CONFIG.W - player.size);
  player.y = clamp(player.y + dy * player.speed, player.size, CONFIG.H - player.size);

  player.angle = angleBetween(player.x, player.y, input.mouseX, input.mouseY);

  // Animation
  if (player.isMoving) {
    player.animTimer += dt;
    if (player.animTimer > 200) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % 2;
    }
  } else {
    player.animFrame = 0;
    player.animTimer = 0;
  }

  // Invulnerability
  if (player.invulnTimer > 0) player.invulnTimer -= dt;

  // Shooting
  const now = performance.now();
  if (input.mouseDown && now - player.lastFireTime > CONFIG.FIRE_COOLDOWN) {
    player.lastFireTime = now;
    const bx = player.x + Math.cos(player.angle) * 22;
    const by = player.y + Math.sin(player.angle) * 22;
    bullets.push(createBullet(bx, by, player.angle));
    playSound('shoot');
  }
}

function updateBullets(dt) {
  for (const b of bullets) {
    if (!b.alive) continue;
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < -20 || b.x > CONFIG.W + 20 || b.y < -20 || b.y > CONFIG.H + 20) {
      b.alive = false;
    }
  }
  // Cleanup
  bullets = bullets.filter(b => b.alive);
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (!e.alive) continue;
    e.angle = angleBetween(e.x, e.y, player.x, player.y);
    e.x += Math.cos(e.angle) * e.speed;
    e.y += Math.sin(e.angle) * e.speed;

    e.animTimer += dt;
    if (e.animTimer > 300) {
      e.animTimer = 0;
      e.animFrame = (e.animFrame + 1) % 2;
    }

    if (e.flashTimer > 0) e.flashTimer -= dt;
  }
  enemies = enemies.filter(e => e.alive);
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}

function updateSpawning(dt) {
  if (level.spawnedCount >= level.totalEnemies) return;
  level.spawnTimer += dt;
  if (level.spawnTimer >= level.spawnInterval) {
    level.spawnTimer = 0;
    const type = pickEnemyType(level.current);
    enemies.push(createEnemy(type, level.current));
    level.spawnedCount++;
  }
}

function render() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const intensity = 4;
    ctx.translate(randRange(-intensity, intensity), randRange(-intensity, intensity));
  }

  if (gameState === 'MENU') {
    renderMenu();
  } else if (gameState === 'PAUSED') {
    renderPaused();
  } else if (gameState === 'GAME_OVER') {
    renderGameOver();
  } else if (gameState === 'LEVEL_COMPLETE') {
    renderLevelComplete();
  } else {
    renderBackground();
    renderBullets();
    renderEnemies();
    renderPlayer();
    renderParticles();
    renderHUD();
  }

  ctx.restore();
}

// ============================================================
// SECTION 11: GAME LOOP & INIT
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// Init
generateSprites();
input.init(canvas);
gameState = 'MENU';
requestAnimationFrame(gameLoop);
  </script>
